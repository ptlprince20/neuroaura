services:
  - type: web
    name: neuro-aura-los
    runtime: python
    # This points Render to your specific folder!
    rootDir: NEURO-Aura
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.x
      - key: FLASK_ENV
        value: production
