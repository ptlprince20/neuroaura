<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroAura | Elite Access</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body.auth-page {
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
            background: var(--obsidian);
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
        }

        body.auth-page::before {
            content: ''; position: fixed; top: -20%; left: -10%; width: 50%; height: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 60%);
            z-index: -1;
        }
        body.auth-page::after {
            content: ''; position: fixed; bottom: -20%; right: -10%; width: 50%; height: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
            z-index: -1;
        }

        /* Preloader Styles */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--obsidian); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease-out;
        }
        .preloader-logo { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 25px; }
        .preloader-logo span { color: var(--cobalt); }
        .progress-container { width: 320px; height: 3px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; position: relative;}
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--cobalt), var(--teal)); transition: width 0.1s linear; }
        .welcome-text { margin-top: 20px; font-size: 0.75rem; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; font-weight: 600;}

        /* Login Card Styles */
        .auth-card {
            padding: 60px 50px; text-align: center; max-width: 440px; width: 100%;
            border-top: 2px solid var(--cobalt);
            border-bottom: 2px solid var(--amethyst);
            opacity: 0; transform: translateY(40px); transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255,255,255,0.02);
        }
        .auth-card.visible { opacity: 1; transform: translateY(0); }

        /* Google One-Tap button wrapper */
        .google-btn-wrapper {
            display: flex; justify-content: center; margin-bottom: 25px;
        }
        /* Rendered GIS button override */
        .google-btn-wrapper > div {
            border-radius: 12px !important;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(255,255,255,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .google-btn-wrapper > div:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,255,255,0.15);
        }

        .divider { display: flex; align-items: center; text-align: center; margin: 30px 0; color: var(--text-dim); font-size: 0.75rem; letter-spacing: 1px;}
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .divider:not(:empty)::before { margin-right: 1.5em; }
        .divider:not(:empty)::after { margin-left: 1.5em; }

        .btn-guest {
            background: linear-gradient(135deg, var(--cobalt), var(--amethyst));
            padding: 16px; border-radius: 12px; width: 100%; border: none; color: white;
            font-weight: 700; cursor: pointer; transition: all 0.3s ease;
            font-family: inherit; font-size: 0.95rem; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
        }
        .btn-guest:hover { box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4); transform: translateY(-3px); }

        /* Google auth feedback */
        #google-status {
            margin-top: 14px; font-size: 0.8rem; color: var(--teal);
            min-height: 20px; display: none;
        }
    </style>
</head>
<body class="auth-page">

    <!-- Preloader Sequence -->
    <div id="preloader">
        <div class="preloader-logo">Neuro<span>Aura</span></div>
        <div class="progress-container">
            <div id="loading-bar" class="progress-bar"></div>
        </div>
        <div class="welcome-text" id="loading-text">Initializing OS Core...</div>
    </div>

    <!-- Login Gateway -->
    <div class="auth-card glass" id="login-gateway">
        <div class="logo" style="margin-bottom: 40px; font-size: 2.2rem;">Neuro<span>Aura</span></div>
        <h3 style="font-weight: 300; margin-bottom: 40px; letter-spacing: -0.5px; color: var(--text-dim);">Authenticate Access</h3>

        <!-- Real Google One-Tap Login -->
        <div class="google-btn-wrapper">
            <div id="g_id_signin"
                 data-client_id="YOUR_GOOGLE_CLIENT_ID"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left"
                 data-width="340">
            </div>
        </div>
        <div id="google-status"></div>

        <div class="divider">OR</div>

        <!-- Hidden Backend Hook for Instant Guest Bypass -->
        <form id="guest-form" action="/login" method="POST" style="display: none;">
            <input type="hidden" name="username" value="demo">
            <input type="hidden" name="password" value="demo123">
        </form>

        <button class="btn-guest" onclick="document.getElementById('guest-form').submit();">
            Proceed as Guest
        </button>

        <p style="margin-top: 40px; font-size: 0.70rem; color: rgba(255,255,255,0.2); text-transform: uppercase; letter-spacing: 2px;">Secure Protocol Ext. 2026</p>
    </div>

    <!-- Google Identity Services Initialization -->
    <script>
        // This callback fires when user picks a Google account
        function handleGoogleCredential(response) {
            const statusEl = document.getElementById('google-status');
            statusEl.style.display = 'block';
            statusEl.innerText = '🔄 Verifying identity with Neuro-Aura OS...';

            fetch('/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: response.credential })
            })
            .then(r => r.json())
            .then(data => {
                if (data.redirect) {
                    statusEl.innerText = '✅ Identity verified! Launching OS...';
                    setTimeout(() => window.location.href = data.redirect, 600);
                } else {
                    statusEl.style.color = '#ef4444';
                    statusEl.innerText = '❌ Login failed. Try again.';
                }
            })
            .catch(() => {
                statusEl.style.color = '#ef4444';
                statusEl.innerText = '❌ Network error. Try Guest mode.';
            });
        }

        // Initialize Google Identity Services
        window.addEventListener('load', () => {
            if (window.google && google.accounts) {
                google.accounts.id.initialize({
                    client_id: 'YOUR_GOOGLE_CLIENT_ID',
                    callback: handleGoogleCredential,
                    auto_select: false,
                    cancel_on_tap_outside: true
                });
                google.accounts.id.renderButton(
                    document.getElementById('g_id_signin'),
                    {
                        theme: 'outline',
                        size: 'large',
                        shape: 'rectangular',
                        width: 340,
                        text: 'signin_with',
                        logo_alignment: 'left'
                    }
                );
            }
        });

        // Preloader
        document.addEventListener("DOMContentLoaded", () => {
            const bar = document.getElementById('loading-bar');
            const text = document.getElementById('loading-text');
            const preloader = document.getElementById('preloader');
            const gateway = document.getElementById('login-gateway');

            let width = 0;
            const interval = setInterval(() => {
                width += 1.5;
                bar.style.width = width + '%';

                if (width > 30 && width < 32) text.innerText = "Synchronizing Cognitive Models...";
                if (width > 60 && width < 62) text.innerText = "Activating Neural Mastery Engine...";
                if (width > 85 && width < 87) text.innerText = "Finalizing Handshake Protocol...";

                if (width >= 100) {
                    clearInterval(interval);
                    bar.style.width = '100%';
                    setTimeout(() => {
                        preloader.style.opacity = '0';
                        setTimeout(() => {
                            preloader.style.display = 'none';
                            gateway.classList.add('visible');
                        }, 800);
                    }, 400);
                }
            }, 30);
        });
    </script>
</body>
</html>
